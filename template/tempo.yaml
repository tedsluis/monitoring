server:
  # The http_listen_port is the port on which Tempo will listen for incoming HTTP requests, such as those from Grafana's Explore feature. The grpc_listen_port is the port on which Tempo will listen for incoming gRPC requests, such as those from the OpenTelemetry Collector.
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  # The distributor is responsible for receiving the traces from the OpenTelemetry Collector and distributing them to the ingesters.
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  # The trace_idle_period is the duration after which an idle trace is considered complete and can be flushed to storage. Setting this to a reasonable value helps ensure that traces are not kept open indefinitely, which can lead to resource exhaustion. In this configuration, we set it to 10 seconds, which means that if no new spans are added to a trace for 10 seconds, the trace will be closed and flushed to storage.
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

compactor:
  # The compactor is responsible for compacting the blocks in the storage and applying retention policies.
  compaction:
    compaction_window: 1h
    max_block_bytes: 100_000_000
    block_retention: 168h
    compacted_block_retention: 1h

storage:
  trace:
    backend: s3
    s3:
      # The S3 configuration for Tempo.
      bucket: tempo-data
      endpoint: minio:9000
      access_key: ${MINIO_ROOT_USER}
      secret_key: ${MINIO_ROOT_PASSWORD}
      insecure: true
    wal:
      # Define the traces WAL here, instead of via CLI
      path: /var/tempo/wal/traces

overrides:
  # Ensure local-blocks is active!
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: fedora-workstation

  storage:
    # The unique cache for the metrics generator
    path: /var/tempo/wal/metrics
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

  processor:
    # Here we provide the local_blocks processor specific configuration
    local_blocks:
      filter_server_spans: false
      
  # Tell the metrics generator where the traces WAL is
  # In Tempo 2.10 this must be configured via traces_storage
  traces_storage:
    path: /var/tempo/wal/traces
