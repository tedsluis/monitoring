server:
  http_listen_port: 4040

storage:
  backend: s3
  s3:
    endpoint: minio:9000
    bucket_name: pyroscope-data
    access_key_id: ${MINIO_ROOT_USER}
    secret_access_key: ${MINIO_ROOT_PASSWORD}
    insecure: true

limits:
  compactor_blocks_retention_period: 336h

compactor:
  compaction_interval: 10m
