auth_enabled: false

server:
  http_listen_port: 3100
 
common:
  path_prefix: /loki
  storage:
    s3:
      # The S3 configuration for Loki.
      endpoint: minio:9000
      bucketnames: loki-data
      access_key_id: ${MINIO_ROOT_USER}
      secret_access_key: ${MINIO_ROOT_PASSWORD}
      s3forcepathstyle: true
      insecure: true
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# The schema_config is required to apply the correct schema for Loki.
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

# The TSDB shipper configuration is required for Loki apply the correct settings. It is responsible for shipping the blocks to the object storage and managing the index and cache.
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
    cache_ttl: 24h

# The compactor is responsible for compacting the blocks in the storage and applying retention policies.
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: s3

# Alertmanager configuration for Loki's Ruler
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true

# Limits configuration for Loki, as it allows us to set limits on the ingestion and retention of logs, which is important for managing the resources and ensuring that the system does not get overwhelmed with too much data.
limits_config:
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  retention_period: 168h # Retain logs for 168 hours (7 days)
  reject_old_samples: true
  reject_old_samples_max_age: 168h # Accept logs up 4 days old
  # Max logs in the future (timezone issues)
  creation_grace_period: 2h