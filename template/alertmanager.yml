global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'web-hook' # Fallback receiver

  routes:
    - receiver: 'keep'
      group_by: ['alertname']
      group_wait: 15s
      group_interval: 15s
      repeat_interval: 1m
      continue: true

    - receiver: 'web-hook'
      group_by: ['alertname']
      group_wait: 30s
      group_interval: 30s
      repeat_interval: 1h

receivers:
- name: "keep"
  # keep webhook receiver, which will send the alert to the keep backend.
  # Note: the url contains the api key, which is used to authenticate the request
  webhook_configs:
    - url: 'http://keep-backend:8080/alerts/event/prometheus?api_key=${KEEP_API_KEY}'
      send_resolved: true

- name: 'web-hook'
  # Here you can later add Email, Slack, Discord, PagerDuty etc.
  # For now we only log it in the container logs or send nothing.
  webhook_configs:
    - url: 'http://webhook-tester:8080/${WEBHOOK_TESTER_UUID}'