server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    # This is the magic: Nginx provides its internal status here.
    # This is needed for the nginx-prometheus-exporter.
    location /stub_status {
        stub_status on;
        access_log off;
        allow all;
    }
}