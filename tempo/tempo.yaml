server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

compactor:
  compaction:
    compaction_window: 1h
    max_block_bytes: 100_000_000
    block_retention: 24h
    compacted_block_retention: 1h

storage:
  trace:
    backend: s3
    s3:
      bucket: tempo-data
      endpoint: minio:9000
      access_key: minio
      secret_key: minio123
      insecure: true
    wal:
      # Define the traces WAL here, instead of via CLI
      path: /var/tempo/wal/traces

overrides:
  # Ensure local-blocks is active!
  metrics_generator_processors: [service-graphs, span-metrics, local-blocks]

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: fedora-workstation

  storage:
    # The unique cache for the metrics generator
    path: /var/tempo/wal/metrics
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

  processor:
    # Here we provide the local_blocks processor specific configuration
    local_blocks:
      filter_server_spans: false
      
  # CRITICAL: Tell the metrics generator where the traces WAL is
  # In Tempo 2.10 this must be configured via traces_storage
  traces_storage:
    path: /var/tempo/wal/traces
