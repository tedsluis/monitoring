groups:
  - name: application_logs
    rules:
      # Example 1: Alert immediately on critical errors
      - alert: CriticalErrorInLogs
        # Count the number of lines with "panic" or "fatal" per minute. If > 0, then alarm.
        expr: count_over_time({job="podman-containers"} |= "panic" [1m]) > 0
        for: 0m # Direct vuren
        labels:
          severity: critical
        annotations:
          summary: "Panic gedetecteerd in {{ $labels.container_name }}"
          description: "De container {{ $labels.container_name }} logt panics/crashes."

      # Example 2: Alert on high error rate
      - alert: HighErrorRate
        # If there are more than 10 errors per minute
        # (?i) makes it case-insensitive (Error, error, ERROR)
        expr: count_over_time({job="podman-containers"} |~ "(?i)error" [1m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Veel errors in {{ $labels.container_name }}"
          description: "Meer dan 10 errors per minuut gedetecteerd in de logs."
  - name: monitoring_log_alerts
    rules:
      # --- GENERIEKE ERROR CATCHER ---
      # Dit kijkt naar ALLE containers in de monitoring stack
      - alert: MonitoringStackErrors
        expr: |
          count_over_time({container_name=~"prometheus|loki|grafana|alertmanager|alloy"} |~ "(?i)error" [2m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Veel errors in monitoring stack: {{ $labels.container_name }}"
          description: "Container {{ $labels.container_name }} logt meer dan 10 errors per 2 minuten."

      # --- SPECIFIEKE LOKI ERROR ---
      - alert: LokiIngestionError
        # Check specifiek op fouten bij het wegschrijven van chunks
        expr: count_over_time({container_name="loki"} |= "failed to flush" [1m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Loki kan data niet wegschrijven"
          description: "Loki logt 'failed to flush'. Check disk ruimte of permissies!"

      # --- SPECIFIEKE ALLOY ERROR ---
      - alert: AlloyPipelineBlocked
        expr: count_over_time({container_name="alloy"} |= "component evaluation failed" [1m]) > 0
        labels:
          severity: warning
        annotations:
          summary: "Alloy Pipeline Fout"
          description: "Een onderdeel van de Alloy pipeline werkt niet goed."
  - name: loki_watchdog
    rules:
      # 1. The Standard Watchdog
      # This alert is ALWAYS 'Firing'.
      # Purpose: Prove that Loki Ruler is running and can talk to Alertmanager.
      - alert: LokiWatchdog
        expr: vector(1)
        labels:
          severity: none
        annotations:
          summary: "Loki Watchdog (Heartbeat)"
          description: "This alert must always be visible. If it's missing, the Loki alerting pipeline is not working anymore."

      # 2. BONUS: Ingestion Watchdog
      # This alert fires if NO logs come in at all.
      # This is different from the Watchdog above; this tests if Alloy/Promtail still sends data.
      - alert: LokiNoLogsIngested
        # Checks if the total rate of logs (across all jobs) is 0.
        expr: sum(rate({job=~".+"}[2m])) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Loki is not receiving logs anymore"
          description: "No logs have been received in Loki for 5 minutes. Check Alloy or Disk Space."