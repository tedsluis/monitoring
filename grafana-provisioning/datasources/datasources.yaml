apiVersion: 1

datasources:
  # Prometheus Datasource
  - name: prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    editable: true

  # Loki Datasource
  - name: loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      derivedFields:
        # This creates a link from Loki logs to Tempo traces if there is a TraceID in the log
        - datasourceUid: tempo
          matcherRegex: "trace_id=(\\w+)"
          name: TraceID
          url: "$${__value.raw}"

  # Tempo Datasource
  - name: tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    access: proxy
    jsonData:
      # Link from Tempo traces back to Loki logs
      tracesToLogsV2:
        datasourceUid: loki
        tags: ['job', 'instance', 'pod', 'container']
      
      # Link the Service Graphs to Prometheus
      serviceMap:
        datasourceUid: prometheus
        
      # tracesToMetrics is mandatory for the Span Rate in the trace list
      tracesToMetrics:
        datasourceUid: prometheus
        tags:
          - key: 'service.name'
            value: 'service'
          - key: 'job'
            value: 'job'
            
      # FIX: Enable TraceQL Metrics via Prometheus! 
      # This stops the 500 errors in Grafana Drilldown.
      traceqlMetrics:
        datasourceUid: prometheus
            
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki